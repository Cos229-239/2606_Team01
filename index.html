<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Every Day</title>
    <style>
      /* Star canvas sits behind everything */
      #star-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
        pointer-events: none;
      }
      /* React root sits above canvas */
      #root {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100vh;
      }
      /* Screen tint overlay — sits between canvas and root */
      #screen-tint {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0;
        transition: background-color 0.6s ease, opacity 0.6s ease;
      }
    </style>
  </head>
  <body>
    <canvas id="star-canvas"></canvas>
    <div id="screen-tint"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/starfield.js"></script>
  </body>
</html>
